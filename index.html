<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology Global 2026</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at bottom, #020111, #000);
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container {
  margin-top: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 15px;
  width: 340px;
  margin: auto;
}

input, button {
  width: 90%;
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: none;
}

button {
  background: linear-gradient(45deg, purple, blue);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  text-align: left;
  font-size: 14px;
  line-height: 1.6;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
<h1>Numerology Global 2026</h1>

<div class="card">
<input id="name" placeholder="First Name">
<input id="surname" placeholder="Last Name">
<input id="date" type="date">

<button onclick="calculate()">Reveal Your Reading</button>

<div class="result" id="result"></div>
</div>
</div>

<script>
// stars
const c=document.getElementById("stars"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let stars=[...Array(300)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2}));
setInterval(()=>{ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="white";stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();});},50);

// math
function reduce(n){while(n>9)n=n.toString().split('').reduce((a,b)=>a+ +b,0);return n;}

// name numerology
function nameNumber(str){
let sum=0;
str=str.toUpperCase();
for(let i=0;i<str.length;i++){
if(str[i]>='A'&&str[i]<='Z') sum+=str.charCodeAt(i)-64;
}
return reduce(sum);
}

// vowels for soul
function soulNumber(str){
let sum=0;
str=str.toUpperCase();
for(let c of str){
if("AEIOU".includes(c)) sum+=c.charCodeAt(0)-64;
}
return reduce(sum);
}

// consonants personality
function personalityNumber(str){
let sum=0;
str=str.toUpperCase();
for(let c of str){
if(c>='A'&&c<='Z' && !"AEIOU".includes(c)) sum+=c.charCodeAt(0)-64;
}
return reduce(sum);
}

// TEXT ENGINE (random)
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function generateText(name, life, destiny, soul, personality){

const intro = [
`${name}, your energy reveals a unique combination of power and purpose.`,
`This reading uncovers deeper layers of your personality, ${name}.`,
`${name}, your numbers show a powerful life pattern forming.`
];

const lifeText = [
`Your Life Path number ${life} defines your main journey and direction in life.`,
`Life Path ${life} represents the core mission your soul is following.`,
`Number ${life} shows the primary energy guiding your life decisions.`
];

const destinyText = [
`Your Destiny number ${destiny} reflects your natural talents and external path.`,
`Destiny ${destiny} reveals what you are meant to achieve in this lifetime.`,
`This number shows how others perceive your strength and abilities.`
];

const soulText = [
`Your Soul number ${soul} represents your inner desires and emotional needs.`,
`This number reveals what truly fulfills you deep inside.`,
`Your inner world is strongly influenced by this vibration.`
];

const personalityText = [
`Your Personality number ${personality} shows how others see you.`,
`This is the energy you project outward into the world.`,
`People often recognize you through this vibration.`
];

const future = [
`In the coming period, major changes are aligning in your favor. Trust your intuition and take action when opportunities appear.`,
`A new phase is approaching. Decisions made soon will shape your long-term future significantly.`,
`You are entering a powerful cycle of growth. Stay focused and avoid distractions.`
];

return `
<h3>Personal Reading</h3>
<p>${pick(intro)}</p>

<p>${pick(lifeText)}</p>
<p>${pick(destinyText)}</p>
<p>${pick(soulText)}</p>
<p>${pick(personalityText)}</p>

<hr>

<h3>Future Insight</h3>
<p>${pick(future)}</p>

<hr>

<b>Summary:</b><br>
Life Path: ${life}<br>
Destiny: ${destiny}<br>
Soul: ${soul}<br>
Personality: ${personality}
`;
}

// main
function calculate(){
const name = document.getElementById("name").value;
const surname = document.getElementById("surname").value;
const date = document.getElementById("date").value;

if(!name || !date) return;

let sum = date.replaceAll("-","").split("").reduce((a,b)=>a+ +b,0);
let life = reduce(sum);

let fullName = name + surname;

let destiny = nameNumber(fullName);
let soul = soulNumber(fullName);
let personality = personalityNumber(fullName);

document.getElementById("result").innerHTML =
generateText(name, life, destiny, soul, personality);
}
</script>

</body>
</html>
