<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Numerology 2026</title>
    <style>
        :root { --primary: #2c3e50; --gold: #c5a059; --light: #f8f9fa; }
        body { background: var(--light); color: var(--primary); font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid #ddd; text-align: center; }
        .lang-switch { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .lang-btn { cursor: pointer; border: 1px solid #ddd; background: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        h1 { color: var(--gold); font-size: 22px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button#main-btn { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #loader { display: none; padding: 30px 0; }
        .progress-bar { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--gold); transition: 0.1s linear; }
        #result { display: none; padding-top: 20px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="lang-switch">
        <button class="lang-btn" onclick="setL('en')">EN</button>
        <button class="lang-btn" onclick="setL('sr')">SRB</button>
    </div>
    <div id="step1">
        <h1 id="h">Numerology Report 2026</h1>
        <div class="form-group"><label id="l1">Full Name</label><input type="text" id="name"></div>
        <div class="form-group"><label id="l2">Date of Birth</label><input type="date" id="dob"></div>
        <div class="form-group"><label id="l3">Time of Birth</label><input type="time" id="tob"></div>
        <div class="form-group"><label id="l4">Place of Birth</label><input type="text" id="pob"></div>
        <button id="main-btn" onclick="calc()">GET MY ANALYSIS</button>
    </div>
    <div id="loader">
        <h2 id="lt">Analyzing...</h2>
        <div class="progress-bar"><div class="fill" id="f"></div></div>
    </div>
    <div id="result">
        <h2 style="color: green;">SUCCESS!</h2>
        <p id="rt">Your basic 2026 chart is ready. To see the full destiny report, please verify you are a human.</p>
        <button style="width:100%; padding:15px; background:#2c3e50; color:white; border:none; border-radius:8px; font-weight:bold;">ACCESS FULL REPORT</button>
    </div>
</div>
<script>
    const tr = {
        en: { h: "Numerology Report 2026", l1: "Full Name", l2: "Date of Birth", l3: "Time of Birth", l4: "Place of Birth", b: "GET MY ANALYSIS", lt: "Analyzing Data...", rt: "Your basic 2026 chart is ready. To see the full destiny report, please verify you are a human." },
        sr: { h: "Numerološki Izveštaj 2026", l1: "Puno Ime", l2: "Datum Rođenja", l3: "Vreme Rođenja", l4: "Mesto Rođenja", b: "DOBIJ ANALIZU", lt: "Analiza podataka...", rt: "Vaša osnovna karta je spremna. Da vidite ceo izveštaj, uradite verifikaciju." }
    };
    function setL(l) {
        document.getElementById('h').innerText = tr[l].h;
        document.getElementById('l1').innerText = tr[l].l1;
        document.getElementById('l2').innerText = tr[l].l2;
        document.getElementById('l3').innerText = tr[l].l3;
        document.getElementById('l4').innerText = tr[l].l4;
        document.getElementById('main-btn').innerText = tr[l].b;
        document.getElementById('lt').innerText = tr[l].lt;
        document.getElementById('rt').innerText = tr[l].rt;
    }
    function calc() {
        if(!document.getElementById('name').value) return alert("Name required!");
        document.getElementById('step1').style.display='none';
        document.getElementById('loader').style.display='block';
        let p=0; let i=setInterval(()=>{
            p++; document.getElementById('f').style.width=p+'%';
            if(p>=100){ clearInterval(i); document.getElementById('loader').style.display='none'; document.getElementById('result').style.display='block'; }
        },60);
    }
</script>
</body>
</html>
