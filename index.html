<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology Global 2026</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#000;color:white;text-align:center;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
.card{background:rgba(255,255,255,0.05);padding:25px;border-radius:15px;width:360px;margin:50px auto;}
input,select,button{width:90%;padding:10px;margin:6px;border-radius:8px;border:none;}
button{background:linear-gradient(45deg,purple,blue);color:white;cursor:pointer;}
.result{text-align:left;margin-top:20px;font-size:14px;}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Numerology Global 2026</h1>

<div class="card">
<input id="name" placeholder="First Name">
<input id="surname" placeholder="Last Name">
<input id="date" type="date">

<button onclick="calculate()">Reveal Your Reading</button>

<div id="result" class="result"></div>
</div>

<script>
// stars
const c=document.getElementById("stars"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let stars=[...Array(200)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2}));
setInterval(()=>{ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="white";stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();});},50);

// MASTER NUMBER SUPPORT
function reduce(n){
while(n>9 && n!=11 && n!=22 && n!=33){
n=n.toString().split('').reduce((a,b)=>a+ +b,0);
}
return n;
}

function nameNumber(str){
let sum=0;str=str.toUpperCase();
for(let i=0;i<str.length;i++){
if(str[i]>='A'&&str[i]<='Z') sum+=str.charCodeAt(i)-64;
}
return reduce(sum);
}

function soulNumber(str){
let sum=0;str=str.toUpperCase();
for(let c of str){if("AEIOU".includes(c)) sum+=c.charCodeAt(0)-64;}
return reduce(sum);
}

function personalityNumber(str){
let sum=0;str=str.toUpperCase();
for(let c of str){if(c>='A'&&c<='Z' && !"AEIOU".includes(c)) sum+=c.charCodeAt(0)-64;}
return reduce(sum);
}

// KARMIC CHECK
function karmic(num){
return [13,14,16,19].includes(num) ? num : null;
}

function calculate(){

const name=document.getElementById("name").value;
const surname=document.getElementById("surname").value;
const date=document.getElementById("date").value;

if(!name||!date)return;

let digits=date.replaceAll("-","").split("");
let sum=digits.reduce((a,b)=>a+ +b,0);

let life=reduce(sum);
let destiny=nameNumber(name+surname);
let soul=soulNumber(name+surname);
let personality=personalityNumber(name+surname);

// NEW
let birthday=parseInt(date.split("-")[2]);
let karmicLife=karmic(sum);
let karmicDestiny=karmic(destiny);

document.getElementById("result").innerHTML=`

<h3>Full Reading</h3>

<p><b>Life Path:</b> ${life}</p>
<p><b>Destiny:</b> ${destiny}</p>
<p><b>Soul:</b> ${soul}</p>
<p><b>Personality:</b> ${personality}</p>
<p><b>Birthday Number:</b> ${birthday}</p>

${karmicLife ? `<p><b>Karmic Debt (Life Path):</b> ${karmicLife}</p>` : ""}
${karmicDestiny ? `<p><b>Karmic Debt (Destiny):</b> ${karmicDestiny}</p>` : ""}

<hr>

<p>${name}, your numbers reveal a strong personal pattern combining internal drive, emotional depth and external influence.</p>

<p>Your Life Path ${life} defines your direction, while Destiny ${destiny} shows how you act in the world.</p>

<p>Your Soul ${soul} reveals inner desires, and Personality ${personality} reflects how others perceive you.</p>

<p>The Birthday number ${birthday} adds a specific personal vibration influencing your talents and natural abilities.</p>

<p>You are currently moving through a phase of development where decisions will shape your long-term direction.</p>
`;
}
</script>

</body>
</html>
