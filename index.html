<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology Global 2026</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0a0f2c,#000);
color:white;
text-align:center;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
width:90%;
max-width:420px;
margin:20px auto;
}

input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
font-size:16px;
}

select{background:#111;color:#fff;}
input{background:rgba(255,255,255,0.1);color:white;}

button{
background:linear-gradient(45deg,#6a00ff,#00c3ff);
color:white;
font-weight:bold;
}

.result{
margin-top:20px;
text-align:left;
font-size:15px;
line-height:1.8;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
}
</style>
</head>

<body>

<h2 id="title"></h2>

<div class="card">

<select id="lang" onchange="setLang()">
<option value="en">English</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
<option value="es">Español</option>
</select>

<input id="fullname">
<input id="nickname">
<input id="date" type="date">
<input id="time" type="time">
<input id="place">

<button id="btn" onclick="calculate()"></button>

<div id="result" class="result"></div>

</div>

<script>

// LANG
const L={
en:{
title:"Numerology Global 2026",
name:"Full Name",
nick:"Nickname (optional)",
place:"Place of Birth",
btn:"Reveal Your Reading"
},
de:{
title:"Numerologie Global 2026",
name:"Vollständiger Name",
nick:"Spitzname (optional)",
place:"Geburtsort",
btn:"Analyse anzeigen"
},
fr:{
title:"Numérologie Global 2026",
name:"Nom complet",
nick:"Surnom (optionnel)",
place:"Lieu de naissance",
btn:"Voir analyse"
},
es:{
title:"Numerología Global 2026",
name:"Nombre completo",
nick:"Apodo (opcional)",
place:"Lugar de nacimiento",
btn:"Ver análisis"
}
};

function setLang(){
let l=document.getElementById("lang").value;
document.getElementById("title").innerText=L[l].title;
document.getElementById("fullname").placeholder=L[l].name;
document.getElementById("nickname").placeholder=L[l].nick;
document.getElementById("place").placeholder=L[l].place;
document.getElementById("btn").innerText=L[l].btn;
}

// numerology
function reduce(n){
while(n>9 && n!=11 && n!=22 && n!=33){
n=n.toString().split('').reduce((a,b)=>a+ +b,0);
}
return n;
}

function nameNum(str){
let sum=0;
str=str.toUpperCase();
for(let c of str){
if(c>='A'&&c<='Z') sum+=c.charCodeAt(0)-64;
}
return reduce(sum);
}

function karmic(n){
return [13,14,16,19].includes(n)?n:null;
}

function pick(a){return a[Math.floor(Math.random()*a.length)];}

function calculate(){

let lang=document.getElementById("lang").value;
let name=document.getElementById("fullname").value;
let nick=document.getElementById("nickname").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let place=document.getElementById("place").value;

if(!name||!date)return;

let sum=date.replaceAll("-","").split("").reduce((a,b)=>a+ +b,0);

let life=reduce(sum);
let destiny=nameNum(name);
let soul=reduce(name.length*2);
let personality=reduce(name.length*3);
let birthday=parseInt(date.split("-")[2]);
let year=reduce(sum + new Date().getFullYear());

let intro=[
`${name}, your numerological profile reveals a deep and complex structure shaped by multiple influences.`,
`This analysis uncovers hidden patterns guiding your personality and decisions.`,
`${name}, your numbers reflect a powerful combination of internal and external energies.`
];

let body=[
`Life Path ${life} defines your main journey and life direction.`,
`Destiny ${destiny} reflects your abilities and external expression.`,
`Soul ${soul} reveals your emotional needs and inner desires.`,
`Personality ${personality} shows how others perceive you.`,
`Birthday ${birthday} adds a personal vibration influencing your talents.`,
`Personal Year ${year} indicates your current life phase and opportunities.`
];

let future=[
`A significant shift is approaching — your decisions now will shape your future.`,
`You are entering a transformative period requiring awareness and focus.`,
`Opportunities will appear — your timing and actions will define success.`
];

let result=`
<h3>${pick(intro)}</h3>
<p>${body.join("</p><p>")}</p>

${nick ? `<p>Your nickname "${nick}" creates an additional energetic layer influencing social interaction.</p>` : ""}
${time ? `<p>Your birth time (${time}) refines your energetic rhythm and decision patterns.</p>` : ""}
${place ? `<p>Your birthplace (${place}) contributes environmental influence to your development.</p>` : ""}

${karmic(sum) ? `<p><b>Karmic Debt (Life):</b> ${karmic(sum)}</p>` : ""}
${karmic(destiny) ? `<p><b>Karmic Debt (Destiny):</b> ${karmic(destiny)}</p>` : ""}

<hr>

<h3>Future Insight</h3>
<p>${pick(future)}</p>
`;

document.getElementById("result").innerHTML=result;
}

setLang();

</script>

</body>
</html>
