<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology Global 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: black;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  margin-top: 50px;
}

input, select, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
  <h1 id="title">Numerology Global 2026</h1>

  <select id="lang" onchange="setLang()">
    <option value="en">English</option>
    <option value="sr">Srpski</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
    <option value="fr">Français</option>
  </select>

  <br>

  <input id="name" placeholder="Name">
  <input id="surname" placeholder="Surname"><br>
  <input id="date" type="date"><br>
  <input id="time" type="time"><br>
  <input id="place" placeholder="Place of birth"><br>

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>
</div>

<script>
// ⭐ STARS
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2
  });
}

function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}
setInterval(drawStars, 50);

// 🌍 TRANSLATIONS
const translations = {
  en: {
    title: "Numerology Global 2026",
    result: "Your Life Path Number:",
    destiny: "Destiny Number:"
  },
  sr: {
    title: "Numerologija Global 2026",
    result: "Vaš životni broj:",
    destiny: "Broj sudbine:"
  }
};

function setLang() {
  const lang = document.getElementById("lang").value;
  document.getElementById("title").innerText = translations[lang].title;
}

// 🔢 LOGIC
function reduceNumber(num) {
  while (num > 9) {
    num = num.toString().split('').reduce((a,b)=>a+parseInt(b),0);
  }
  return num;
}

function getMeaning(num, lang) {
  const meanings = {
    en: {
      1: "Leader, independent, strong will",
      2: "Sensitive, partnership, diplomacy",
      3: "Creative, expressive",
      4: "Stable, practical",
      5: "Freedom, adventure",
      6: "Family, responsibility",
      7: "Spiritual, analytical",
      8: "Power, success, money",
      9: "Humanitarian, emotional"
    },
    sr: {
      1: "Vođa, nezavisan, jak karakter",
      2: "Osetljiv, partnerstvo",
      3: "Kreativan, komunikativan",
      4: "Stabilan, praktičan",
      5: "Sloboda, avantura",
      6: "Porodica, odgovornost",
      7: "Duhovan, analitičan",
      8: "Uspeh, moć, novac",
      9: "Humanitaran, emotivan"
    }
  };

  return meanings[lang][num] || "";
}

function calculate() {
  const date = document.getElementById("date").value;
  if (!date) return;

  let sum = date.replaceAll("-", "")
    .split("")
    .reduce((a,b)=>a+parseInt(b),0);

  let lifePath = reduceNumber(sum);

  const name = document.getElementById("name").value +
               document.getElementById("surname").value;

  let nameSum = 0;
  name.toUpperCase().split("").forEach(ch=>{
    if(ch >= 'A' && ch <= 'Z'){
      nameSum += ch.charCodeAt(0)-64;
    }
  });

  let destiny = reduceNumber(nameSum);

  const lang = document.getElementById("lang").value;

  document.getElementById("result").innerHTML =
    translations[lang].result + " " + lifePath +
    "<br>" + getMeaning(lifePath, lang) +
    "<br><br>" + translations[lang].destiny + " " + destiny +
    "<br>" + getMeaning(destiny, lang);
}
</script>

</body>
</html>
