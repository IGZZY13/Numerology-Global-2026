<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology Global 2026</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0a0f2c,#000);
color:white;
text-align:center;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

h1{
margin-top:30px;
font-size:22px;
}

.card{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(20px);
padding:25px 20px;
border-radius:20px;
width:90%;
max-width:420px;
margin:20px auto;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

input,select,button{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
font-size:16px;
}

input{
background:rgba(255,255,255,0.1);
color:white;
}

select{
background:rgba(255,255,255,0.1);
color:white;
}

button{
background:linear-gradient(45deg,#6a00ff,#00c3ff);
color:white;
font-weight:bold;
transition:0.2s;
}

button:active{
transform:scale(0.97);
}

.result{
margin-top:20px;
text-align:left;
font-size:15px;
line-height:1.7;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1 id="title">Numerology Global 2026</h1>

<div class="card">

<select id="lang" onchange="setLang()">
<option value="en">English</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
<option value="es">Español</option>
</select>

<input id="name" placeholder="First Name">
<input id="surname" placeholder="Last Name">
<input id="date" type="date">

<button id="btn" onclick="calculate()">Reveal Your Reading</button>

<div id="result" class="result"></div>

</div>

<script>
// stars
const c=document.getElementById("stars"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let stars=[...Array(200)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2}));
setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,6.28);
ctx.fill();
});
},50);

// language UI
const ui={
en:{title:"Numerology Global 2026",btn:"Reveal Your Reading"},
de:{title:"Numerologie Global 2026",btn:"Analyse anzeigen"},
fr:{title:"Numérologie Global 2026",btn:"Voir votre analyse"},
es:{title:"Numerología Global 2026",btn:"Ver análisis"}
};

function setLang(){
let l=document.getElementById("lang").value;
document.getElementById("title").innerText=ui[l].title;
document.getElementById("btn").innerText=ui[l].btn;
}

// numerology
function reduce(n){
while(n>9 && n!=11 && n!=22 && n!=33){
n=n.toString().split('').reduce((a,b)=>a+ +b,0);
}
return n;
}

function nameNumber(str){
let sum=0;
str=str.toUpperCase();
for(let i=0;i<str.length;i++){
if(str[i]>='A'&&str[i]<='Z') sum+=str.charCodeAt(i)-64;
}
return reduce(sum);
}

function soulNumber(str){
let sum=0;
str=str.toUpperCase();
for(let c of str){
if("AEIOU".includes(c)) sum+=c.charCodeAt(0)-64;
}
return reduce(sum);
}

function personalityNumber(str){
let sum=0;
str=str.toUpperCase();
for(let c of str){
if(c>='A'&&c<='Z' && !"AEIOU".includes(c)) sum+=c.charCodeAt(0)-64;
}
return reduce(sum);
}

function karmic(n){
return [13,14,16,19].includes(n)?n:null;
}

// main
function calculate(){

const lang=document.getElementById("lang").value;
const name=document.getElementById("name").value;
const surname=document.getElementById("surname").value;
const date=document.getElementById("date").value;

if(!name||!date)return;

let digits=date.replaceAll("-","").split("");
let sum=digits.reduce((a,b)=>a+ +b,0);

let life=reduce(sum);
let destiny=nameNumber(name+surname);
let soul=soulNumber(name+surname);
let personality=personalityNumber(name+surname);

let birthday=parseInt(date.split("-")[2]);
let karmicLife=karmic(sum);
let karmicDestiny=karmic(destiny);

// TEXT
let text={
en:`${name}, your numerology reveals a complex personality shaped by deep internal and external forces.

Your Life Path ${life} defines your direction, while Destiny ${destiny} shows how you act in the world.

Soul ${soul} reflects your inner desires, while Personality ${personality} shows how others see you.

Your Birthday number ${birthday} adds a unique influence to your talents.

You are currently in a phase where important decisions will shape your future.

A powerful change is approaching — your awareness will determine your success.`,
de:`${name}, dein Profil zeigt eine komplexe Persönlichkeit mit starken Einflüssen.

Lebenszahl ${life} bestimmt deinen Weg und Schicksalszahl ${destiny} dein Handeln.

Seelenzahl ${soul} zeigt deine Wünsche und Persönlichkeit ${personality} dein Auftreten.

Geburtstag ${birthday} bringt zusätzliche Energie.

Eine wichtige Phase beginnt.`,
fr:`${name}, votre profil montre une personnalité complexe.

Chemin ${life}, destinée ${destiny}, âme ${soul} et personnalité ${personality} définissent votre nature.

Anniversaire ${birthday} ajoute une influence unique.

Un changement important arrive.`,
es:`${name}, tu perfil muestra una personalidad compleja.

Vida ${life}, destino ${destiny}, alma ${soul} y personalidad ${personality} te definen.

Cumpleaños ${birthday} agrega energía única.

Un cambio importante se acerca.`
};

let result = `<p>${text[lang]}</p>`;

if(karmicLife) result+=`<p><b>Karmic Debt (Life):</b> ${karmicLife}</p>`;
if(karmicDestiny) result+=`<p><b>Karmic Debt (Destiny):</b> ${karmicDestiny}</p>`;

document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
