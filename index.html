<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Global 2026</title>
    <!-- CPAGrip Integration -->
    <script type="text/javascript">
        var cpalead_url = "TVOJ_LINK_OVDE"; 
    </script>
    <style>
        :root { --gold: #D4AF37; --bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 480px; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--gold); }
        h1 { color: var(--gold); font-size: 2.2rem; margin-bottom: 5px; }
        p { color: #777; margin-bottom: 25px; line-height: 1.6; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--gold); color: white; border: none; padding: 18px; width: 100%; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b8952e; transform: translateY(-2px); }
        
        #loading-section { display: none; margin-top: 30px; }
        .progress-container { width: 100%; background: #f0f0f0; height: 14px; border-radius: 7px; overflow: hidden; margin-bottom: 15px; }
        .progress-bar { width: 0%; height: 100%; background: var(--gold); transition: linear; }
        #status-msg { font-style: italic; color: #888; height: 20px; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="input-section">
        <h1>Numerology Global 2026</h1>
        <p>Enter your birth details to unlock your professional 2026 destiny report.</p>
        <input type="text" id="userName" placeholder="Full Name">
        <input type="date" id="userDob">
        <button onclick="processData()">GET MY REPORT</button>
    </div>

    <div id="loading-section">
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        <p id="status-msg">Initializing cosmic matrix...</p>
    </div>
</div>

<script>
    function processData() {
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('userDob').value;
        if(!name || !dob) { alert("Please fill in all fields."); return; }

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('loading-section').style.display = 'block';

        let progress = 0;
        const bar = document.getElementById('p-bar');
        const status = document.getElementById('status-msg');
        const messages = [
            "Analyzing numerical matrix...",
            "Aligning with 2026 cosmic trends...",
            "Decoding life path vibration...",
            "Finalizing your destiny report..."
        ];

        let interval = setInterval(() => {
            progress++;
            bar.style.width = progress + "%";
            
            if(progress < 25) status.innerText = messages[0];
            else if(progress < 50) status.innerText = messages[1];
            else if(progress < 75) status.innerText = messages[2];
            else status.innerText = messages[3];

            if(progress >= 100) {
                clearInterval(interval);
                // CPAGrip Content Locker Trigger
                if(typeof call_locker_function === 'function') {
                    call_locker_function();
                } else {
                    window.location.href = cpalead_url;
                }
            }
        }, 200); // 200ms * 100 = 20 SECONDS RETENTION
    }
</script>

</body>
</html>
